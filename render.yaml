services:
  - type: web
    name: niislel-car-wash
    runtime: node
    plan: free
    region: singapore
    buildCommand: npm install --no-audit --no-fund
    startCommand: npm start
    healthCheckPath: /api/health
    maxShutdownDelaySeconds: 30
    envVars:
      - key: NODE_ENV
        value: production
      - key: ADMIN_INITIAL_PASSWORD
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: niislel-car-wash-db
          property: connectionString

databases:
  - name: niislel-car-wash-db
    plan: free
    region: singapore
    ipAllowList: []
